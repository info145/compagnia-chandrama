<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guarda lo Spettacolo — Compagnia Chāndrama</title>
  <link rel="icon" href="/Foto/Logo.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e8dcc8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem;
    }
    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
    }
    .logo {
      font-family: 'Georgia', serif;
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c0a060;
      text-decoration: none;
    }
    .back {
      font-size: 0.8rem;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .back:hover { color: #e8dcc8; }
    h1 {
      font-family: 'Georgia', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c0a060;
      margin-bottom: 1.5rem;
      text-align: center;
      max-width: 900px;
    }
    .player-wrap {
      width: 100%;
      max-width: 900px;
      position: relative;
      padding-bottom: 56.25%;
      background: #111;
      border: 1px solid #c0a060;
      border-radius: 6px;
      overflow: hidden;
    }
    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .error {
      max-width: 600px;
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-top: 3rem;
    }
    .error strong { color: #c0a060; }
    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">Chāndrama</a>
    <a href="/#streaming" class="back">← Torna al sito</a>
  </header>

  <h1 id="page-title">Caricamento…</h1>

  <div class="player-wrap" id="player-wrap">
    <iframe id="vimeo-player" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>

  <div class="error" id="error-msg" style="display:none;">
    <strong>Link non valido o scaduto.</strong><br/>
    Se hai effettuato il pagamento e non riesci ad accedere allo spettacolo, scrivici a
    <a href="mailto:compagniachandrama@gmail.com" style="color:#c0a060;">compagniachandrama@gmail.com</a>
    allegando la ricevuta Stripe.
  </div>

  <footer>© 2026 Compagnia Chāndrama — Torino</footer>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const embedEncoded = params.get('embed');
      const title = params.get('title');
      const tok = params.get('tok');

      const titleEl = document.getElementById('page-title');
      const playerEl = document.getElementById('vimeo-player');
      const errorEl = document.getElementById('error-msg');
      const wrapEl = document.getElementById('player-wrap');

      if (!embedEncoded || !tok) {
        titleEl.textContent = 'Accesso non autorizzato';
        wrapEl.style.display = 'none';
        errorEl.style.display = 'block';
        return;
      }

      const embedUrl = decodeURIComponent(embedEncoded);

      titleEl.textContent = title || 'Oltre i Muri';
      playerEl.src = embedUrl;
    })();
  </script>
</body>
</html>
